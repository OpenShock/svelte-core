name: Release

# Versioning + publishing via Changesets, publishing to npm with OIDC
# "trusted publishing" — no NPM_TOKEN secret required.
#
# One-time setup on npmjs.com (Package settings -> Trusted Publisher):
#   - Provider: GitHub Actions
#   - Organization / repository: OpenShock/svelte-core
#   - Workflow filename: release.yml
# Provenance is generated automatically (publishConfig.provenance + id-token).

on:
  push:
    branches: [master]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create tags / the "Version Packages" PR
  pull-requests: write # open the "Version Packages" PR
  id-token: write # OIDC token for npm trusted publishing + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify
        run: |
          pnpm run lint
          pnpm run check
          pnpm test
          pnpm run build

      # When changesets exist, opens/updates a "Version Packages" PR.
      # When that PR is merged (no changesets left, versions bumped), publishes.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
